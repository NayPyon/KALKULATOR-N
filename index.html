<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulator Jumlah Lilitan n</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 32px 16px;
  }

  .card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    width: 100%;
    max-width: 520px;
    padding: 32px 28px 28px;
  }

  h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.05rem;
    color: #1a237e;
    margin-bottom: 4px;
  }

  .subtitle {
    font-size: 0.75rem;
    color: #aaa;
    font-family: 'IBM Plex Mono', monospace;
    margin-bottom: 22px;
  }

  .formula-box {
    background: #f5f7ff;
    border-left: 4px solid #3949ab;
    border-radius: 6px;
    padding: 12px 16px;
    margin-bottom: 22px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.84rem;
    color: #3949ab;
    line-height: 2.2;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 2px;
  }

  .frac {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    vertical-align: middle;
    margin: 0 3px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.84rem;
  }
  .frac .num {
    border-bottom: 1.5px solid #3949ab;
    padding: 0 4px 1px;
    text-align: center;
    white-space: nowrap;
  }
  .frac .den {
    padding: 1px 4px 0;
    text-align: center;
    white-space: nowrap;
  }

  .section-title {
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #aaa;
    margin-bottom: 12px;
  }

  .input-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  label {
    font-size: 0.78rem;
    font-weight: 500;
    color: #444;
    font-family: 'IBM Plex Mono', monospace;
  }

  input[type="number"] {
    border: 1.5px solid #dde1f0;
    border-radius: 7px;
    padding: 9px 10px;
    font-size: 0.88rem;
    font-family: 'IBM Plex Mono', monospace;
    color: #222;
    background: #fafbff;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  input[type="number"]:focus { border-color: #3949ab; background: #fff; }

  input[disabled] {
    opacity: 0.65;
    cursor: not-allowed;
  }

  .unit { font-size: 0.68rem; color: #aaa; margin-left: 2px; }

  button {
    width: 100%;
    margin-top: 20px;
    padding: 12px;
    background: #3949ab;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.18s, transform 0.1s;
  }
  button:hover { background: #283593; }
  button:active { transform: scale(0.98); }

  .result-box {
    display: none;
    margin-top: 22px;
    background: #e8eaf6;
    border-radius: 10px;
    padding: 18px 18px 14px;
  }

  .result-title {
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #5c6bc0;
    margin-bottom: 12px;
  }

  .step {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.80rem;
    color: #37474f;
    margin-bottom: 7px;
    padding: 7px 10px;
    background: #fff;
    border-radius: 5px;
    border-left: 3px solid #7986cb;
    line-height: 1.8;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 3px;
  }

  .final-result {
    margin-top: 12px;
    background: #3949ab;
    color: #fff;
    border-radius: 8px;
    padding: 14px 18px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.1rem;
    font-weight: 600;
    text-align: center;
  }

  /* inline frac untuk steps */
  .sf {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    vertical-align: middle;
    margin: 0 3px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.80rem;
  }
  .sf .sn { border-bottom: 1.5px solid #37474f; padding: 0 3px 1px; text-align: center; white-space: nowrap; }
  .sf .sd { padding: 1px 3px 0; text-align: center; white-space: nowrap; }

  /* superscript biar rapih untuk (3/2) */
  sup { font-size: 0.78em; vertical-align: super; }
</style>
</head>
<body>
<div class="card">
  <h1>Kalkulator Jumlah Lilitan (n)</h1>
  <div class="subtitle">Medan Magnet Kumparan — Formula Biot-Savart</div>

  <div class="formula-box">
    <div>
      B =
      <span class="frac">
        <span class="num">μ₀ · n · I · r²</span>
        <span class="den">2(r² + x²)<sup>3/2</sup></span>
      </span>
    </div>
    <div>
      n =
      <span class="frac">
        <span class="num">B · 2(r² + x²)<sup>3/2</sup></span>
        <span class="den">μ₀ · I · r²</span>
      </span>
    </div>
  </div>

  <div class="section-title">Input Nilai</div>

  <div class="input-row">
    <div class="input-group">
      <label>B <span class="unit">(mT)</span></label>
      <input type="number" id="B" value="7.8" step="any" placeholder="misal: 7.8">
    </div>
    <div class="input-group">
      <label>I <span class="unit">(A)</span></label>
      <input type="number" id="I" value="0.5" step="any">
    </div>
  </div>

  <div class="input-row">
    <div class="input-group">
      <label>r <span class="unit">(m)</span></label>
      <input type="number" id="r" value="0.0625" step="any" disabled>
    </div>
    <div class="input-group">
      <label>x <span class="unit">(m)</span></label>
      <input type="number" id="x" value="0" step="any">
    </div>
  </div>

  <div class="input-group" style="margin-bottom:4px">
    <label>μ₀ <span class="unit">(T·m/A)</span></label>
    <input type="number" id="mu0" value="0.000001257" step="any" disabled>
  </div>

  <button onclick="hitung()">Hitung</button>

  <div class="result-box" id="result">
    <div class="result-title">Langkah Penyelesaian</div>
    <div id="steps"></div>
    <div class="final-result" id="final"></div>
  </div>
</div>

<script>
/* =========================
   Formatter: tanpa notasi "e"
   + adaptif (hapus 0 sisa)
   ========================= */
const SUP = {"0":"⁰","1":"¹","2":"²","3":"³","4":"⁴","5":"⁵","6":"⁶","7":"⁷","8":"⁸","9":"⁹"};

function toSup(nStr) {
  return String(nStr).split("").map(ch => SUP[ch] ?? ch).join("");
}

function trimZeros(str) {
  // "7.8000" -> "7.8", "7.0000" -> "7", "7" -> "7"
  return String(str)
    .replace(/(\.\d*?)0+$/, "$1")
    .replace(/\.$/, "");
}

function powText(baseHtml, supText) {
  return `${baseHtml}<sup>${supText}</sup>`;
}

function fmtSci(v, d = 4) {
  if (!isFinite(v)) return String(v);
  if (v === 0) return "0";

  const s = Number(v).toExponential(d); // "1.2570e-6"
  const m = s.match(/^([+-]?\d(?:\.\d+)?)e([+-])(\d+)$/i);
  if (!m) return String(v);

  const mantissa = trimZeros(m[1]);
  const sign = m[2];
  const exp = m[3];

  const signSup = (sign === "-") ? "⁻" : "";
  const expSup = toSup(exp);

  return `${mantissa} × 10${signSup}${expSup}`;
}

function fmtAuto(v, d = 4) {
  if (!isFinite(v)) return String(v);
  if (v === 0) return "0";

  const av = Math.abs(v);
  if (av >= 1e-3 && av < 1e4) return trimZeros(Number(v).toFixed(8));
  return fmtSci(v, d);
}

/* =========================
   B input: mT -> T
   - User input 7.8 berarti 7.8 mT = 7.8 × 10^-3 T
   - Ditampilkan adaptif: 7.8 × 10⁻³
   ========================= */
function parseB_mT_to_T() {
  const raw = (document.getElementById('B').value || "").trim();

  // kalau user tulis scientific (mis 7.8e-3), anggap itu sudah Tesla (T)
  if (/e/i.test(raw)) return Number(raw);

  const v = Number(raw); // mT
  if (!isFinite(v)) return NaN;

  return v * 1e-3; // Tesla
}

function fmtB_as_mT_times_10neg3(B_in_T, d = 4) {
  const mantissa_mT = B_in_T / 1e-3; // balik ke mT
  const mantissa = trimZeros(Number(mantissa_mT).toFixed(d));
  return `${mantissa} × 10⁻³`;
}

function sf(num, den) {
  return `<span class="sf"><span class="sn">${num}</span><span class="sd">${den}</span></span>`;
}

function hitung() {
  const B_T = parseB_mT_to_T(); // Tesla untuk perhitungan
  const I   = parseFloat(document.getElementById('I').value);
  const r   = parseFloat(document.getElementById('r').value);
  const x   = parseFloat(document.getElementById('x').value);
  const mu0 = parseFloat(document.getElementById('mu0').value);

  const r2    = r * r;
  const x2    = x * x;
  const r2x2  = r2 + x2;
  const base  = Math.pow(r2x2, 1.5);
  const num   = B_T * 2 * base;
  const den   = mu0 * I * r2;
  const n     = num / den;

  const steps = [];
  steps.push(`n = ` + sf(`B · 2${powText('(r² + x²)', '3/2')}`, `μ₀ · I · r²`));

  const B_disp = fmtB_as_mT_times_10neg3(B_T, 4);

  steps.push(
    `n = ` + sf(
      `${B_disp} × 2 × ${powText(`((${fmtSci(r,4)})² + (${fmtSci(x,4)})²)`, '3/2')}`,
      `${fmtSci(mu0,4)} × ${fmtAuto(I,4)} × (${fmtSci(r,4)})²`
    )
  );

  steps.push(
    `n = ` + sf(
      `${B_disp} × 2 × ${powText(`(${fmtSci(r2,4)} + ${fmtSci(x2,4)})`, '3/2')}`,
      `${fmtSci(mu0,4)} × ${fmtAuto(I,4)} × ${fmtSci(r2,4)}`
    )
  );

  steps.push(
    `n = ` + sf(
      `${B_disp} × 2 × ${powText(`(${fmtSci(r2x2,4)})`, '3/2')}`,
      `${fmtSci(mu0,4)} × ${fmtAuto(I,4)} × ${fmtSci(r2,4)}`
    )
  );

  steps.push(
    `n = ` + sf(
      `${B_disp} × 2 × ${fmtSci(base,4)}`,
      `${fmtSci(mu0,4)} × ${fmtAuto(I,4)} × ${fmtSci(r2,4)}`
    )
  );

  steps.push(
    `n = ` + sf(
      `${fmtSci(num,4)}`,
      `${fmtSci(den,4)}`
    )
  );

  steps.push(`n = ${trimZeros(n.toFixed(4))} lilitan`);

  document.getElementById('steps').innerHTML =
    steps.map(s => `<div class="step">${s}</div>`).join('');

  document.getElementById('final').textContent =
    `n = ${trimZeros(n.toFixed(4))} lilitan ≈ ${Math.round(n)} lilitan`;

  document.getElementById('result').style.display = 'block';
}
</script>
</body>
</html>
