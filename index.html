<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulator Jumlah Lilitan n</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 32px 16px;
  }

  .card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    width: 100%;
    max-width: 520px;
    padding: 32px 28px 28px;
  }

  h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.05rem;
    color: #1a237e;
    margin-bottom: 4px;
  }

  .subtitle {
    font-size: 0.75rem;
    color: #aaa;
    font-family: 'IBM Plex Mono', monospace;
    margin-bottom: 22px;
  }

  .formula-box {
    background: #f5f7ff;
    border-left: 4px solid #3949ab;
    border-radius: 6px;
    padding: 12px 16px;
    margin-bottom: 22px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.84rem;
    color: #3949ab;
    line-height: 2.2;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 2px;
  }

  .frac {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    vertical-align: middle;
    margin: 0 3px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.84rem;
  }
  .frac .num {
    border-bottom: 1.5px solid #3949ab;
    padding: 0 4px 1px;
    text-align: center;
    white-space: nowrap;
  }
  .frac .den {
    padding: 1px 4px 0;
    text-align: center;
    white-space: nowrap;
  }

  .section-title {
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #aaa;
    margin-bottom: 12px;
  }

  .input-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  label {
    font-size: 0.78rem;
    font-weight: 500;
    color: #444;
    font-family: 'IBM Plex Mono', monospace;
  }

  input[type="text"] {
    border: 1.5px solid #dde1f0;
    border-radius: 7px;
    padding: 9px 10px;
    font-size: 0.88rem;
    font-family: 'IBM Plex Mono', monospace;
    color: #222;
    background: #fafbff;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  input[type="text"]:focus { border-color: #3949ab; background: #fff; }

  input[disabled] { opacity: 0.65; cursor: not-allowed; }
  .unit { font-size: 0.68rem; color: #aaa; margin-left: 2px; }

  button {
    width: 100%;
    margin-top: 20px;
    padding: 12px;
    background: #3949ab;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.18s, transform 0.1s;
  }
  button:hover { background: #283593; }
  button:active { transform: scale(0.98); }

  .result-box {
    display: none;
    margin-top: 22px;
    background: #e8eaf6;
    border-radius: 10px;
    padding: 18px 18px 14px;
  }

  .result-title {
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #5c6bc0;
    margin-bottom: 12px;
  }

  .step {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.80rem;
    color: #37474f;
    margin-bottom: 7px;
    padding: 10px 10px;
    background: #fff;
    border-radius: 5px;
    border-left: 3px solid #7986cb;
    line-height: 2.0;
  }

  .final-result {
    margin-top: 12px;
    background: #3949ab;
    color: #fff;
    border-radius: 8px;
    padding: 14px 18px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.1rem;
    font-weight: 600;
    text-align: center;
  }

  .sf {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    vertical-align: middle;
    margin: 0 3px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.80rem;
  }
  .sf .sn { border-bottom: 1.5px solid #37474f; padding: 0 3px 1px; text-align: center; white-space: nowrap; }
  .sf .sd { padding: 1px 3px 0; text-align: center; white-space: nowrap; }

  sup { font-size: 0.78em; vertical-align: super; }
</style>
</head>
<body>
<div class="card">
  <h1>Kalkulator Jumlah Lilitan (n)</h1>
  <div class="subtitle">Medan Magnet Kumparan — Formula Biot-Savart</div>

  <div class="formula-box">
    <div>
      B =
      <span class="frac">
        <span class="num">μ₀ · n · I · r²</span>
        <span class="den">2(r² + x²)<sup>3/2</sup></span>
      </span>
    </div>
    <div>
      n =
      <span class="frac">
        <span class="num">B · 2(r² + x²)<sup>3/2</sup></span>
        <span class="den">μ₀ · I · r²</span>
      </span>
    </div>
  </div>

  <div class="section-title">Input Nilai</div>

  <div class="input-row">
    <div class="input-group">
      <label>B <span class="unit">(mT)</span></label>
      <input type="text" id="B" value="7,8" inputmode="decimal">
    </div>
    <div class="input-group">
      <label>I <span class="unit">(A)</span></label>
      <input type="text" id="I" value="0,5" inputmode="decimal">
    </div>
  </div>

  <div class="input-row">
    <div class="input-group">
      <label>r <span class="unit">(m)</span></label>
      <input type="text" id="r" value="0,0625" inputmode="decimal" disabled>
    </div>
    <div class="input-group">
      <label>x <span class="unit">(m)</span></label>
      <input type="text" id="x" value="0" inputmode="decimal">
    </div>
  </div>

  <div class="input-group" style="margin-bottom:4px">
    <label>μ₀ <span class="unit">(T·m/A)</span></label>
    <input type="text" id="mu0" value="0,000001257" inputmode="decimal" disabled>
  </div>

  <button onclick="hitung()">Hitung</button>

  <div class="result-box" id="result">
    <div class="result-title">Langkah Penyelesaian</div>
    <div id="steps"></div>
    <div class="final-result" id="final"></div>
  </div>
</div>

<script>
/* ========= parse + format ========= */
const SUP = {"0":"⁰","1":"¹","2":"²","3":"³","4":"⁴","5":"⁵","6":"⁶","7":"⁷","8":"⁸","9":"⁹"};
function toSup(nStr) { return String(nStr).split("").map(ch => SUP[ch] ?? ch).join(""); }

function trimZeros(str) {
  return String(str).replace(/(\.\d*?)0+$/, "$1").replace(/\.$/, "");
}

function parseIDNumber(raw) {
  if (raw == null) return NaN;
  const s = String(raw).trim().replace(/\s+/g, "").replace(",", ".");
  return Number(s);
}

function dotToComma(str) { return String(str).replace(/\./g, ","); }
function powText(baseHtml, supText) { return `${baseHtml}<sup>${supText}</sup>`; }

/* Notasi ilmiah: mantissa pakai koma, tapi operatornya "x 10" */
function fmtSciID(v, d = 4) {
  if (!isFinite(v)) return String(v);
  if (v === 0) return "0";

  const s = Number(v).toExponential(d);
  const m = s.match(/^([+-]?\d(?:\.\d+)?)e([+-])(\d+)$/i);
  if (!m) return dotToComma(String(v));

  const mantissa = trimZeros(m[1]);
  const sign = m[2];
  const exp = m[3];
  const signSup = (sign === "-") ? "⁻" : "";
  const expSup = toSup(exp);

  return `${dotToComma(mantissa)} x 10${signSup}${expSup}`;
}

/* angka biasa */
function fmtAutoID(v) {
  if (!isFinite(v)) return String(v);
  if (v === 0) return "0";

  const av = Math.abs(v);
  if (av >= 1e-3 && av < 1e4) return dotToComma(trimZeros(Number(v).toFixed(8)));
  return fmtSciID(v, 4);
}

/* ========= B: input mT -> T, tampil mantissa x 10⁻³ ========= */
function parseB_mT_to_T() {
  const raw = document.getElementById('B').value;

  if (/e/i.test(String(raw))) return parseIDNumber(raw); // Tesla langsung
  const v_mT = parseIDNumber(raw);
  if (!isFinite(v_mT)) return NaN;
  return v_mT * 1e-3;
}
function fmtB_as_mT_times_10neg3_ID(B_T, d = 4) {
  const mantissa_mT = B_T / 1e-3;
  const mantissa = dotToComma(trimZeros(Number(mantissa_mT).toFixed(d)));
  return `${mantissa} x 10⁻³`;
}

/* ========= fraction renderer ========= */
function sf(num, den) {
  return `<span class="sf"><span class="sn">${num}</span><span class="sd">${den}</span></span>`;
}

/* ========= main ========= */
function hitung() {
  const B_T = parseB_mT_to_T();
  const I   = parseIDNumber(document.getElementById('I').value);
  const r   = parseIDNumber(document.getElementById('r').value);
  const x   = parseIDNumber(document.getElementById('x').value);
  const mu0 = parseIDNumber(document.getElementById('mu0').value);

  const r2    = r * r;
  const x2    = x * x;
  const r2x2  = r2 + x2;
  const base  = Math.pow(r2x2, 1.5);
  const num   = B_T * 2 * base;
  const den   = mu0 * I * r2;
  const n     = num / den;

  // display
  const B_disp    = fmtB_as_mT_times_10neg3_ID(B_T, 4); // "7,8 x 10⁻³"
  const twoB_disp = fmtSciID(2 * B_T, 4);              // "15,6 x 10⁻³"
  const r_disp    = fmtSciID(r, 4);                    // "6,25 x 10⁻²"
  const x_disp    = fmtSciID(x, 4);
  const mu_disp   = fmtSciID(mu0, 4);                  // "1,257 x 10⁻⁶"
  const I_disp    = fmtAutoID(I);
  const base_disp = fmtSciID(base, 4);
  const r2_disp   = fmtSciID(r2, 4);
  const muI_disp  = fmtSciID(mu0 * I, 4);

  const steps = [];

  // (1) substitusi penuh:
  // notasi ilmiah: "x 10", tetapi perkalian biasa: "·"
  steps.push(
    `(1) n = ` + sf(
      `${B_disp} · 2 · ${powText(`((${r_disp})² + (${x_disp})²)`, '3/2')}`,
      `${mu_disp} · ${I_disp} · (${r_disp})²`
    )
  );

  // (2) ringkas
  steps.push(
    `(2) n = ` + sf(
      `${twoB_disp} · ${base_disp}`,
      `${muI_disp} · ${r2_disp}`
    )
  );

  // (3) pecahan final
  steps.push(
    `(3) n = ` + sf(
      `${fmtSciID(num,4)}`,
      `${fmtSciID(den,4)}`
    )
  );

  // (4) hasil
  const nTxt = dotToComma(trimZeros(n.toFixed(4)));
  steps.push(`(4) n = ${nTxt} lilitan`);

  document.getElementById('steps').innerHTML =
    steps.map(s => `<div class="step">${s}</div>`).join('');

  document.getElementById('final').textContent =
    `n = ${nTxt} lilitan ≈ ${Math.round(n)} lilitan`;

  document.getElementById('result').style.display = 'block';
}
</script>
</body>
</html>
